<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja Universo Marnew</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    header {
      background: #111;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }
    .produto {
      background: #fff;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .produto h2 {
      margin: 0 0 10px;
    }
    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #ff4500;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      margin-top: 10px;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>

<header>
  <h1>🛍️ Loja Universo Marnew</h1>

</header>

<div class="container">

  <div class="produto">
    <h2>Panela de Pressão Marmol 4.2L</h2>
    <p>Qualidade premium com frete grátis.</p>
    <a class="btn" href="https://meli.la/1K8CFCK" target="_blank">Comprar agora</a>
  </div>

  <div class="produto">
    <h2>Produto 2 - Em breve</h2>
    <p>Mais ofertas chegando...</p>

</div>

<footer>
  © 2026 Universo Marnew - Afiliados Mercado Livre
</footer>

</body>
</html>
